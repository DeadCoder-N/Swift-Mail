<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Envelope body -->
  <rect x="8" y="20" width="48" height="32" rx="4" fill="white" opacity="0.95"/>

  <!-- Envelope flap V shape -->
  <polyline points="8,20 32,38 56,20" fill="none" stroke="url(#bg)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Thunder bolt -->
  <polygon points="35,14 27,32 33,32 29,50 42,28 35,28" fill="url(#bolt)" stroke="#d97706" stroke-width="0.8" stroke-linejoin="round"/>
</svg>
